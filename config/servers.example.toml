# `metrics_interval_seconds` now governs the runtime loop and freshness thresholds.
# It does not control `system`/`gpu` sample cadence while metrics streaming is enabled.
metrics_interval_seconds = 3
status_interval_seconds = 12

[notifications]
desktop_enabled = false
webhook_enabled = false
webhook_url = ""

[[servers]]
server_id = "server-a"
ssh_alias = "gpu-prod-a"
working_dirs = ["/work/project-a", "/work/project-b"]
enabled_panels = ["system", "gpu", "git", "clash"]

[[servers]]
server_id = "server-b"
ssh_alias = "gpu-prod-b"
working_dirs = ["/work/project-c", "/work/project-d"]
enabled_panels = ["system", "gpu", "git", "clash"]

