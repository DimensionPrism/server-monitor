<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Server Monitor Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="page-header">
      <div>
        <h1>Cloud Server Monitor</h1>
        <p>Agentless SSH monitoring in one local dashboard</p>
      </div>
      <nav class="tabs">
        <button id="tab-monitor" class="tab active" type="button">Monitor</button>
        <button id="tab-settings" class="tab" type="button">Settings</button>
      </nav>
    </header>

    <main>
      <section id="view-monitor" class="view active">
        <div id="monitor-grid" class="grid"></div>
      </section>

      <section id="view-settings" class="view">
        <section class="settings-shell">
          <div class="settings-add-card">
            <h2>Server Settings</h2>

            <form id="add-server-form" class="settings-form">
              <label>
                Server ID
                <input id="new-server-id" type="text" required placeholder="server-a" />
              </label>
              <label>
                SSH Alias
                <input id="new-server-alias" type="text" required placeholder="gpu-prod-a" />
              </label>
              <label>
                Working Directories (one per line)
                <textarea id="new-server-dirs" rows="4" placeholder="/work/repo-a"></textarea>
              </label>
              <label>
                Clash API Probe URL
                <input id="new-clash-api-probe-url" type="text" value="http://127.0.0.1:9090/version" placeholder="http://127.0.0.1:9090/version" />
              </label>
              <label>
                Clash UI Probe URL
                <input id="new-clash-ui-probe-url" type="text" value="http://127.0.0.1:9090/ui" placeholder="http://127.0.0.1:9090/ui" />
              </label>
              <fieldset>
                <legend>Enabled Panels</legend>
                <label><input type="checkbox" name="new-panel" value="system" checked /> System</label>
                <label><input type="checkbox" name="new-panel" value="gpu" checked /> GPU</label>
                <label><input type="checkbox" name="new-panel" value="git" checked /> Git</label>
                <label><input type="checkbox" name="new-panel" value="clash" checked /> Clash</label>
              </fieldset>
              <button type="submit">Add Server</button>
            </form>
          </div>

          <div class="settings-workspace-grid">
            <div class="settings-overview-section settings-overview-rail">
              <div class="settings-section-head">
                <h3>Configured Servers</h3>
              </div>
              <div id="settings-overview" class="settings-overview"></div>
            </div>

            <div id="settings-editor-panel" class="settings-editor-panel settings-editor-canvas"></div>
          </div>
        </section>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
